<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вопрос — Ответ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="quiz-card">
    <h1>Вопрос — Ответ</h1>

    <div class="question-block">
      <div class="question-text" id="questionText">Вопрос появится здесь</div>
      <div class="controls">
        <button class="btn btn-accent" id="speakBtn">
          🔊 Озвучить вопрос
        </button>
        <button class="btn btn-secondary" id="skipBtn">Пропустить</button>
      </div>
    </div>

    <div class="answer-block">
      <label for="userAnswer">Ваш ответ:</label>
      <input type="text" id="userAnswer" placeholder="Введите ответ..." autocomplete="off" />
      <div id="feedback" class="feedback"></div>
      
      <button class="btn btn-accent next-btn" id="checkBtn">Проверить</button>
      <!-- Новая кнопка: появляется после проверки -->
      <button class="btn btn-secondary next-btn" id="nextBtn" style="display: none;">Далее ➡</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
